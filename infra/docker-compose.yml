version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: chat_postgres
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat1234
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: chat_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongo_data:
